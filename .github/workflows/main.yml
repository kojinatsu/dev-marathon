name: production workflow

on:
  push:
    branches:
      - main

jobs:
  deploy-staging:
    runs-on: ubuntu-latest

    steps:
      - id: ssh-staging
        uses: invi5H/ssh-action@v1
        with:
          SSH_HOST: ${{ secrets.DEV_SSH_HOST }}
          SSH_PORT: ${{ secrets.DEV_SSH_PORT }}
          SSH_USER: ${{ secrets.DEV_SSH_USER }}
          SSH_KEY: ${{ secrets.DEV_SSHE_SSH_KEY }}

      - name: Deploy to Staging
        run: ssh ${{ steps.ssh-staging.outputs.SERVER }} bash /app/na-kojima/deploy.sh na-kojima

  test-staging:
    runs-on: ubuntu-latest
    needs: deploy-staging

    steps:
      - id: ssh-staging-test
        uses: invi5H/ssh-action@v1
        with:
          SSH_HOST: ${{ secrets.DEV_SSH_HOST }}
          SSH_PORT: ${{ secrets.DEV_SSH_PORT }}
          SSH_USER: ${{ secrets.DEV_SSH_USER }}
          SSH_KEY: ${{ secrets.DEV_SSHE_SSH_KEY }}

      - name: Run Cypress test on Staging
        run: ssh ${{ steps.ssh-staging-test.outputs.SERVER }} "cd /ci && npx cypress run --browser chrome --spec cypress/e2e/na-kojima-25.*"

  deploy-production:
    runs-on: ubuntu-latest
    needs: test-staging

    steps:
      - id: ssh-production
        uses: invi5H/ssh-action@v1
        with:
          SSH_HOST: ${{ secrets.PROD_SSH_HOST }}
          SSH_PORT: ${{ secrets.PROD_SSH_PORT }}
          SSH_USER: ${{ secrets.PROD_SSH_USER }}
          SSH_KEY: ${{ secrets.PROD_SSH_KEY }}

      - name: Deploy to Production
        run: ssh ${{ steps.ssh-production.outputs.SERVER }} bash /app/na-kojima/deploy.sh na-kojima
