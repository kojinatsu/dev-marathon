<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>顧客詳細</title>
    <!-- Bootstrap CSSの読み込み -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
</head>
<body>
    <div class="container mt-5">
        <h2 class="mb-4">顧客詳細</h2>

        <table class="table table-bordered">
            <tr>
                <th>ID</th>
                <td id="id"></td>
            </tr>
            <tr>
                <th>会社名</th>
                <td id="company_name"></td>
            </tr>
            <tr>
                <th>業種</th>
                <td id="industry"></td>
            </tr>
            <tr>
                <th>連絡先</th>
                <td id="contact"></td>
            </tr>
            <tr>
                <th>所在地</th>
                <td id="location"></td>
            </tr>
        </table>

        <a href="./list.html" class="btn btn-secondary">一覧へ戻る</a>
    </div>

    <script type="module">
        import config from "../config.js";

        const params = new URLSearchParams(window.location.search);
        const id = params.get("id");

        if (!id) {
            alert("顧客IDが指定されていません。");
            location.href = "./list.html";
        }

        fetch(`${config.apiUrl}/customers/${id}`)
            .then((response) => {
                if (!response.ok) {
                    throw new Error("顧客情報の取得に失敗しました。");
                }
                return response.json();
            })
            .then((customer) => {
                document.getElementById("id").textContent = customer.id;
                document.getElementById("company_name").textContent = customer.company_name;
                document.getElementById("industry").textContent = customer.industry;
                document.getElementById("contact").textContent = customer.contact;
                document.getElementById("location").textContent = customer.location;
            })
            .catch((error) => {
                console.error(error);
                alert("顧客情報の取得に失敗しました。");
                location.href = "./list.html";
            });
    </script>

    <!-- BootstrapのJavaScriptの読み込み -->
    <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"></script>
</body>
</html>
