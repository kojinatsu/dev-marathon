<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>顧客情報登録確認</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
</head>
<body>
    <div class="container mt-5">
        <h2 class="mb-4">顧客情報登録確認</h2>

        <p>以下の内容で登録します。よろしいですか？</p>

        <table class="table table-bordered">
            <tr>
                <th>会社名</th>
                <td id="companyName"></td>
            </tr>
            <tr>
                <th>業種</th>
                <td id="industry"></td>
            </tr>
            <tr>
                <th>連絡先</th>
                <td id="contact"></td>
            </tr>
            <tr>
                <th>所在地</th>
                <td id="location"></td>
            </tr>
        </table>

        <button id="register-button" class="btn btn-primary">登録</button>
        <button id="back-button" class="btn btn-secondary">戻る</button>
    </div>

    <script type="module">
        import config from '../config.js';

        const customerData = JSON.parse(sessionStorage.getItem('customerData'));

        if (!customerData) {
            alert('登録する顧客情報がありません。');
            location.href = './add.html';
        }

        document.getElementById('companyName').textContent = customerData.companyName;
        document.getElementById('industry').textContent = customerData.industry;
        document.getElementById('contact').textContent = customerData.contact;
        document.getElementById('location').textContent = customerData.location;

        document.getElementById('back-button').addEventListener('click', function() {
            history.back();
        });

        document.getElementById('register-button').addEventListener('click', function() {
            const params = new URLSearchParams(customerData);

            fetch(config.apiUrl + '/add-customer', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded'
                },
                body: params
            }).then(response => response.json())
              .then(data => {
                if (data.success) {
                    sessionStorage.removeItem('customerData');
                    alert('顧客情報が正常に保存されました。');
                    location.href = './list.html';
                } else {
                    alert('保存に失敗しました。');
                }
              })
              .catch(error => {
                console.error('Error:', error);
                alert('エラーが発生しました。');
              });
        });
    </script>

    <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"></script>
</body>
</html>
