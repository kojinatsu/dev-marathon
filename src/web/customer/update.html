<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>顧客情報編集</title>
    <!-- Bootstrap CSSの読み込み -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
</head>
<body>
    <div class="container mt-5">
        <h2 class="mb-4">顧客情報編集</h2>

        <form id="customer-update-form">
            <div class="form-group">
                <label for="companyName">会社名:</label>
                <input type="text" class="form-control" id="companyName" name="companyName" required>
            </div>

            <div class="form-group">
                <label for="industry">業種:</label>
                <input type="text" class="form-control" id="industry" name="industry" required>
            </div>

            <div class="form-group">
                <label for="contact">連絡先:</label>
                <input type="text" class="form-control" id="contact" name="contact" required>
            </div>

            <div class="form-group">
                <label for="location">所在地:</label>
                <input type="text" class="form-control" id="location" name="location" required>
            </div>

            <button type="submit" class="btn btn-primary">更新</button>
            <a id="back-button" class="btn btn-secondary">詳細へ戻る</a>
        </form>
    </div>

    <script type="module">
        import config from "../config.js";

        const params = new URLSearchParams(window.location.search);
        const id = params.get("id");

        if (!id) {
            alert("顧客IDが指定されていません。");
            location.href = "./list.html";
        }

        document.getElementById("back-button").href = `./detail.html?id=${id}`;

        fetch(`${config.apiUrl}/customers/${id}`)
            .then((response) => {
                if (!response.ok) {
                    throw new Error("顧客情報の取得に失敗しました。");
                }
                return response.json();
            })
            .then((customer) => {
                document.getElementById("companyName").value = customer.company_name;
                document.getElementById("industry").value = customer.industry;
                document.getElementById("contact").value = customer.contact;
                document.getElementById("location").value = customer.location;
            })
            .catch((error) => {
                console.error(error);
                alert("顧客情報の取得に失敗しました。");
                location.href = "./list.html";
            });

        document.getElementById("customer-update-form").addEventListener("submit", function(e) {
            e.preventDefault();

            const customerData = {
                companyName: document.getElementById("companyName").value,
                industry: document.getElementById("industry").value,
                contact: document.getElementById("contact").value,
                location: document.getElementById("location").value
            };

            fetch(`${config.apiUrl}/customers/${id}`, {
                method: "PUT",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(customerData)
            })
            .then((response) => response.json())
            .then((data) => {
                if (data.success) {
                    alert("顧客情報を更新しました。");
                    location.href = `./detail.html?id=${id}`;
                } else {
                    alert("更新に失敗しました。");
                }
            })
            .catch((error) => {
                console.error(error);
                alert("エラーが発生しました。");
            });
        });
    </script>

    <!-- BootstrapのJavaScriptの読み込み -->
    <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"></script>
</body>
</html>
